name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pest:
    name: Pest tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo, pdo_sqlite, sqlite3
          coverage: none

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy .env
        run: cp .env.example .env

      - name: Generate app key
        run: php artisan key:generate

      - name: Run Pest tests
        run: php artisan test

  e2e:
    name: E2E tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: pocket_money
          POSTGRES_USER: sail
          POSTGRES_PASSWORD: password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo, pdo_pgsql
          coverage: none

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Configure .env
        run: |
          cp .env.example .env
          sed -i 's/^DB_HOST=.*/DB_HOST=127.0.0.1/' .env
          sed -i 's/^MAIL_MAILER=.*/MAIL_MAILER=log/' .env
          php artisan key:generate

      - name: Run database migrations and seed
        run: php artisan migrate --seed --force

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Start application server
        run: php artisan serve --host=127.0.0.1 --port=8000 &

      - name: Wait for server to be ready
        run: |
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:8000 > /dev/null 2>&1 && break
            sleep 1
          done

      - name: Run E2E tests
        run: npx playwright test
        env:
          APP_URL: http://127.0.0.1:8000
          LARAVEL_SAIL: 1

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: /tmp/pw-test-results/
          retention-days: 7

  deploy:
    name: Deploy to Laravel Cloud
    needs: [pest, e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Laravel Cloud
        uses: PeteBishwhip/deploy-to-laravel-cloud-action@v1
        with:
          api_token: ${{ secrets.LARAVEL_CLOUD_API_TOKEN }}
          application_name: ${{ vars.LARAVEL_CLOUD_APP_NAME }}
          environment_name: ${{ vars.LARAVEL_CLOUD_ENVIRONMENT_NAME }}

