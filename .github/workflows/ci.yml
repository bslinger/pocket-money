name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pest:
    name: Pest tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo, pdo_sqlite, sqlite3
          coverage: xdebug

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy .env
        run: cp .env.example .env

      - name: Generate app key
        run: php artisan key:generate

      - name: Run Pest tests with coverage
        run: php artisan test --stop-on-failure --log-junit storage/coverage/pest/junit.xml --coverage-html storage/coverage/pest/html --coverage-clover storage/coverage/pest/clover.xml
        env:
          XDEBUG_MODE: coverage

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: storage/coverage/pest/clover.xml
          flags: pest
          token: ${{ secrets.CODECOV_TOKEN }}
          disable_search: true

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          files: storage/coverage/pest/junit.xml
          flags: pest
          token: ${{ secrets.CODECOV_TOKEN }}
          disable_search: true
          report_type: test_results

      - name: Upload Pest coverage report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: pest-coverage
          path: storage/coverage/pest/
          retention-days: 14

  e2e:
    name: E2E tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: pocket_money
          POSTGRES_USER: sail
          POSTGRES_PASSWORD: password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo, pdo_pgsql

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Configure .env
        run: |
          cp .env.example .env
          sed -i 's/^DB_HOST=.*/DB_HOST=127.0.0.1/' .env
          sed -i 's/^MAIL_MAILER=.*/MAIL_MAILER=log/' .env
          php artisan key:generate

      - name: Run database migrations and seed
        run: php artisan migrate --seed --force

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Start application server
        run: php artisan serve --host=127.0.0.1 --port=8000 &

      - name: Wait for server to be ready
        run: |
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:8000 > /dev/null 2>&1 && break
            sleep 1
          done

      - name: Run E2E tests
        run: npx playwright test
        env:
          APP_URL: http://127.0.0.1:8000
          LARAVEL_SAIL: 1
          COLLECT_COVERAGE: true

      - name: Generate E2E JS coverage report
        if: always()
        run: npm run coverage:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: /tmp/pw-test-results/
          retention-days: 7

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: storage/coverage/e2e/html/lcov.info
          flags: e2e
          token: ${{ secrets.CODECOV_TOKEN }}
          disable_search: true

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          files: test-results/e2e-junit.xml
          flags: e2e
          token: ${{ secrets.CODECOV_TOKEN }}
          disable_search: true
          report_type: test_results

      - name: Upload E2E coverage report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: e2e-coverage
          path: storage/coverage/e2e/
          retention-days: 14

  android:
    name: Build Android APK
    needs: [pest, e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk quiddo-debug.apk

      - name: Upload APK to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-build
          name: Latest Debug Build
          body: "Debug APK built from ${{ github.sha }}"
          prerelease: true
          files: quiddo-debug.apk
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    name: Deploy to Laravel Cloud
    needs: [pest, e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Laravel Cloud
        uses: PeteBishwhip/deploy-to-laravel-cloud-action@v1
        with:
          api_token: ${{ secrets.LARAVEL_CLOUD_API_TOKEN }}
          application_name: ${{ vars.LARAVEL_CLOUD_APP_NAME }}
          environment_name: ${{ vars.LARAVEL_CLOUD_ENVIRONMENT_NAME }}
