appId: host.exp.exponent
---
# Login flow — authenticates and lands on dashboard
# Prerequisite: `npx expo start` running locally

- openLink: ${EXPO_URL}

# If on login screen, fill and submit
- runFlow:
    when:
      visible: "Sign In"
    commands:
      - tapOn: "Email"
      - eraseText: 50
      - inputText: ${EMAIL}
      - tapOn: "Password"
      - eraseText: 50
      - inputText: ${PASSWORD}
      - hideKeyboard
      - takeScreenshot: screenshots/01-login-filled
      - tapOn: "Sign In"

# Dismiss 1Password if it appears
- runFlow:
    when:
      visible: "No, thanks"
    commands:
      - tapOn: "No, thanks"

# Navigate to dashboard — tap tab twice to scroll to top
- extendedWaitUntil:
    visible: "Quiddo"
    timeout: 15000
- tapOn:
    text: "Dashbo.*"
- tapOn:
    text: "Dashbo.*"

# Scroll to top to ensure Family Balance is visible
- swipe:
    direction: DOWN
    duration: 500
- swipe:
    direction: DOWN
    duration: 500
- swipe:
    direction: DOWN
    duration: 500

- extendedWaitUntil:
    visible: "Family Balance"
    timeout: 10000

- takeScreenshot: screenshots/02-dashboard

# Scroll to bottom to show approval section
- swipe:
    direction: UP
    duration: 500
- swipe:
    direction: UP
    duration: 500
- swipe:
    direction: UP
    duration: 500
- swipe:
    direction: UP
    duration: 500
- swipe:
    direction: UP
    duration: 500
- takeScreenshot: screenshots/02b-dashboard-approvals
