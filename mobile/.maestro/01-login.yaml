appId: host.exp.exponent
---
# Login flow — authenticates and lands on dashboard
# Prerequisite: `npx expo start` running locally

- openLink: ${EXPO_URL}

# If on login screen, fill and submit
- runFlow:
    when:
      visible: "Sign In"
    commands:
      - tapOn: "Email"
      - eraseText: 50
      - inputText: ${EMAIL}
      - tapOn: "Password"
      - eraseText: 50
      - inputText: ${PASSWORD}
      - hideKeyboard
      - takeScreenshot: screenshots/01-login-filled
      - tapOn: "Sign In"

# Dismiss 1Password if it appears
- runFlow:
    when:
      visible: "No, thanks"
    commands:
      - tapOn: "No, thanks"

- extendedWaitUntil:
    visible: "Family Balance"
    timeout: 15000

- takeScreenshot: screenshots/02-dashboard
