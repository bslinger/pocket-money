appId: host.exp.exponent
---
# Create account flow — navigate to kid detail, tap Add Account, fill form
# Assumes user is logged in and has at least one kid

- openLink: ${EXPO_URL}

- extendedWaitUntil:
    visible: "Quiddo"
    timeout: 10000

# Navigate to Kids tab
- tapOn: "Kids"
- extendedWaitUntil:
    visible: "Kids"
    timeout: 5000

# Tap the first kid's view button (eye icon)
- tapOn:
    id: "eye"
    index: 0
    optional: true

# Fallback: tap first kid card directly if no icon found
- runFlow:
    when:
      notVisible: "Accounts"
    commands:
      - tapOn:
          text: "\\$.*"
          index: 0

- extendedWaitUntil:
    visible: "Accounts"
    timeout: 5000

- takeScreenshot: screenshots/30-kid-detail-accounts-tab

# Tap Add Account button
- tapOn: "Add Account"
- extendedWaitUntil:
    visible: "Account Name"
    timeout: 5000

- takeScreenshot: screenshots/31-create-account-empty

# Verify child selection is shown
- assertVisible: "Kid"

# Enter account name
- tapOn: "e.g. Spending, Savings, Birthday"
- inputText: "Test Savings"
- hideKeyboard

- takeScreenshot: screenshots/32-create-account-name-filled

# Verify currency mode buttons exist
- assertVisible: "Dollars"
- assertVisible: "Custom"

- takeScreenshot: screenshots/33-create-account-currency-buttons

# Tap Create Account button
- tapOn: "Create Account"

# Navigate back
- pressKey: back
