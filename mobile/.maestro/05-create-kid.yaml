appId: host.exp.exponent
---
# Create kid flow
# Assumes user is already logged in

- openLink: ${EXPO_URL}

- extendedWaitUntil:
    visible: "Quiddo"
    timeout: 10000

# Navigate to Kids tab
- tapOn: "Kids"
- extendedWaitUntil:
    visible: "Kids"
    timeout: 5000

# Tap Add Kid button
- tapOn:
    text: ".*Add Kid"
- extendedWaitUntil:
    visible: "Create Kid"
    timeout: 5000

- takeScreenshot: screenshots/11-create-kid-empty

# Fill in kid name
- tapOn: "Enter kid's name"
- inputText: "Test Kid"
- hideKeyboard

- takeScreenshot: screenshots/12-create-kid-filled

# Navigate back
- pressKey: back
