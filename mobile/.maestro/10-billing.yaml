appId: host.exp.exponent
---
# Billing screen flow
# Assumes user is logged in

- openLink: ${EXPO_URL}

- extendedWaitUntil:
    visible: "Quiddo"
    timeout: 10000

# Open profile panel
- tapOn: "Profile menu"
- extendedWaitUntil:
    visible: "Billing"
    timeout: 5000

# Tap Billing
- tapOn: "Billing"
- extendedWaitUntil:
    visible: "Billing & Subscription"
    timeout: 5000

- takeScreenshot: screenshots/23-billing

# Scroll to see plans/features
- swipe:
    direction: UP
    duration: 500

- takeScreenshot: screenshots/24-billing-plans

# Navigate back
- pressKey: back
