appId: host.exp.exponent
---
# Settings screen flow
# Assumes user is logged in

- openLink: ${EXPO_URL}

- extendedWaitUntil:
    visible: "Quiddo"
    timeout: 10000

# Open profile panel
- tapOn: "Profile menu"
- extendedWaitUntil:
    visible: "Profile settings"
    timeout: 5000

# Tap Profile settings
- tapOn: "Profile settings"
- extendedWaitUntil:
    visible: "Settings"
    timeout: 5000

- takeScreenshot: screenshots/21-settings

# Scroll down to see all options
- swipe:
    direction: UP
    duration: 500

- takeScreenshot: screenshots/22-settings-bottom

# Navigate back
- pressKey: back
