appId: host.exp.exponent
---
# Open profile panel and capture screenshot
# Assumes user is already logged in

- openLink: ${EXPO_URL}

- extendedWaitUntil:
    visible: "Quiddo"
    timeout: 30000

# Tap the profile icon (top right circle)
- tapOn:
    point: "93%,6%"

- extendedWaitUntil:
    visible: "Profile settings"
    timeout: 5000

- takeScreenshot: screenshots/08-profile-panel

# Close panel by tapping overlay on the left
- tapOn:
    point: "10%,50%"
