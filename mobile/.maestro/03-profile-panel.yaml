appId: host.exp.exponent
---
# Open profile panel and capture screenshot
# Assumes user is already logged in

- launchApp

- assertVisible:
    text: "Quiddo"
    maxTimeout: 10000

# Tap the profile icon (top right)
- tapOn:
    point: "95%,5%"

- assertVisible:
    text: "Profile settings"
    maxTimeout: 5000

- takeScreenshot: screenshots/08-profile-panel

# Close panel by tapping overlay
- tapOn:
    point: "10%,50%"
