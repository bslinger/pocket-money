appId: host.exp.exponent
---
# Open profile panel and capture screenshot
# Assumes user is already logged in and on a tab screen

- openLink: ${EXPO_URL}

# Wait for app to be ready (any tab content visible)
- extendedWaitUntil:
    visible: "Quiddo"
    timeout: 10000

# Tap profile menu button
- tapOn: "Profile menu"

- extendedWaitUntil:
    visible: "Profile settings"
    timeout: 5000

- takeScreenshot: screenshots/08-profile-panel

# Close panel
- tapOn:
    point: "10%,50%"
