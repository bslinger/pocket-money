appId: host.exp.exponent
---
# Open profile panel and capture screenshot
# Assumes user is already logged in

- openLink: ${EXPO_URL}

# Navigate to dashboard
- tapOn:
    text: "Dashbo.*"
- extendedWaitUntil:
    visible: "Family Balance"
    timeout: 10000

# Tap profile menu button
- tapOn: "Profile menu"

- extendedWaitUntil:
    visible: "Profile settings"
    timeout: 5000

- takeScreenshot: screenshots/08-profile-panel

# Close panel
- tapOn:
    point: "10%,50%"
