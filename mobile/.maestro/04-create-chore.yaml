appId: host.exp.exponent
---
# Create a chore flow
# Assumes user is already logged in and on a tab screen

- openLink: ${EXPO_URL}

# Go to chores tab
- tapOn: "Chores"
- extendedWaitUntil:
    visible: "Chores"
    timeout: 5000

# Tap new chore button
- tapOn:
    text: ".*New Chore"
- extendedWaitUntil:
    visible: "Chore Name"
    timeout: 5000

- takeScreenshot: screenshots/09-create-chore-empty

# Fill in chore name
- tapOn: "e.g. Make bed, Feed the dog"
- inputText: "Test Chore"
- hideKeyboard

- takeScreenshot: screenshots/10-create-chore-filled

# Navigate back to tab bar for next flow
- pressKey: back
