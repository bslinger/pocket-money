appId: host.exp.exponent
---
# Goal detail flow — view a goal's details
# Assumes user is logged in and has at least one active goal

- openLink: ${EXPO_URL}

- extendedWaitUntil:
    visible: "Quiddo"
    timeout: 10000

# Navigate to Goals tab
- tapOn: "Goals"
- extendedWaitUntil:
    visible: "Goals"
    timeout: 5000

# Tap the first goal card
- tapOn:
    text: "\\$.*of \\$.*"
    index: 0

- extendedWaitUntil:
    visible: "Target Date"
    timeout: 5000

- takeScreenshot: screenshots/27-goal-detail

# Navigate back
- pressKey: back
