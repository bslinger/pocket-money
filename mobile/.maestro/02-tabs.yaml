appId: host.exp.exponent
---
# Navigate through all tabs and capture screenshots
# Assumes user is already logged in from 01-login

- openLink: ${EXPO_URL}

- extendedWaitUntil:
    visible: "Family Balance"
    timeout: 30000

- takeScreenshot: screenshots/03-dashboard-full

# Kids tab
- tapOn: "Kids"
- extendedWaitUntil:
    visible: "Kids"
    timeout: 5000
- takeScreenshot: screenshots/04-kids

# Chores tab
- tapOn: "Chores"
- extendedWaitUntil:
    visible: "Chores"
    timeout: 5000
- takeScreenshot: screenshots/05-chores

# Goals tab
- tapOn: "Goals"
- extendedWaitUntil:
    visible: "Goals"
    timeout: 5000
- takeScreenshot: screenshots/06-goals

# Pocket Money tab — text is truncated on tab bar, use partial match
- tapOn:
    text: "Pocket.*"
- extendedWaitUntil:
    visible: "Pocket Money"
    timeout: 5000
- takeScreenshot: screenshots/07-pocket-money
