appId: host.exp.exponent
---
# Navigate through all tabs and capture screenshots
# Assumes user is already logged in from 01-login

- launchApp

# Wait for dashboard
- assertVisible:
    text: "Dashboard"
    timeout: 10000
- takeScreenshot: screenshots/03-dashboard-full

# Kids tab
- tapOn: "Kids"
- assertVisible:
    text: "Kids"
    timeout: 5000
- takeScreenshot: screenshots/04-kids

# Chores tab
- tapOn: "Chores"
- assertVisible:
    text: "Chores"
    timeout: 5000
- takeScreenshot: screenshots/05-chores

# Goals tab
- tapOn: "Goals"
- assertVisible:
    text: "Goals"
    timeout: 5000
- takeScreenshot: screenshots/06-goals

# Pocket Money tab
- tapOn: "Pocket Money"
- assertVisible:
    text: "Pocket Money"
    timeout: 5000
- takeScreenshot: screenshots/07-pocket-money
