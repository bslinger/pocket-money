appId: host.exp.exponent
---
# Navigate through all tabs and capture screenshots
# Assumes user is already logged in

- openLink: ${EXPO_URL}

# Wait for app — Quiddo header is always visible
- extendedWaitUntil:
    visible: "Quiddo"
    timeout: 10000

# Dashboard — tap twice + scroll to top
- tapOn:
    text: "Dashbo.*"
- tapOn:
    text: "Dashbo.*"
- swipe:
    direction: DOWN
    duration: 500
- swipe:
    direction: DOWN
    duration: 500
- swipe:
    direction: DOWN
    duration: 500
- extendedWaitUntil:
    visible: "Family Balance"
    timeout: 10000
- takeScreenshot: screenshots/03-dashboard-full

# Kids tab
- tapOn: "Kids"
- extendedWaitUntil:
    visible: "Kids"
    timeout: 5000
- takeScreenshot: screenshots/04-kids

# Chores tab
- tapOn: "Chores"
- extendedWaitUntil:
    visible: "Chores"
    timeout: 5000
- takeScreenshot: screenshots/05-chores

# Goals tab
- tapOn: "Goals"
- extendedWaitUntil:
    visible: "Goals"
    timeout: 5000
- takeScreenshot: screenshots/06-goals

# Pocket Money tab
- tapOn:
    text: "Pocket.*"
- extendedWaitUntil:
    visible: "Pocket Money"
    timeout: 5000
- takeScreenshot: screenshots/07-pocket-money

# Return to dashboard for next flow
- tapOn:
    text: "Dashbo.*"
